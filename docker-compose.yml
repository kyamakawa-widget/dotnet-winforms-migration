services:
  localstack:
    container_name: localstack_main
    image: localstack/localstack:latest
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - DEBUG=1
    volumes:
      - "./volume:/var/lib/localstack"
  db:
    container_name: postgres_db
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-p@ssw0rd}
      - POSTGRES_DB=${POSTGRES_DB:-HANBAI}
    volumes:
      - ./infrastructure/db/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
  app:
    container_name: csharp_app
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    ports:
      - "5153:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB:-HANBAI};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-p@ssw0rd};
      - AWS__ServiceURL=http://localstack_main:4566
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - localstack
      - db
  agent:
    container_name: python_agent
    build:
      context: ./src/Agent
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
volumes:
  postgres_data:
